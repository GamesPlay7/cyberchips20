<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Roulette</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .roulette-body {
            background-color: #0b111e;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            font-family: sans-serif;
            color: #fff;
        }

        /* Головна зона: колесо + ставки */
        .roulette-container {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Ліва інформаційна панель */
        .side-panel {
            width: 280px;
            background: #131c2e;
            border: 1px solid #1f314f;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 450px;
            box-sizing: border-box;
        }

        .stats-box {
            background: #090f1a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1f314f;
            font-size: 14px;
        }
        .stats-box p { margin-bottom: 8px; }
        .stats-box p:last-child { margin-bottom: 0; }

        .history-box {
            flex: 1;
            background: #090f1a;
            border: 1px solid #1f314f;
            border-radius: 8px;
            padding: 12px;
            overflow-y: auto;
            text-align: left;
            font-size: 13px;
        }
        .history-title {
            font-size: 11px;
            color: #8fa0bc;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        /* КОЛЕСО РУЛЕТКИ (ГЕНЕРУЄТЬСЯ КОДОМ) */
        .wheel-area {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .roulette-wheel {
            width: 340px;
            height: 340px;
            border-radius: 50%;
            border: 12px solid #4a2e1b; /* Дерев'яний борт казино */
            background: #090f1a;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.1, 1);
            position: relative;
            overflow: hidden; /* Щоб зрізати сектори по колу */
        }

        /* Динамічний сектор (промінь з центру) */
        .wheel-sector {
            position: absolute;
            top: 0;
            left: 50%;
            width: 30px;
            height: 50%;
            margin-left: -15px;
            transform-origin: bottom center;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 12px;
            box-sizing: border-box;
            /* Створюємо трикутну форму сектора рулетки */
            clip-path: polygon(0 0, 100% 0, 56% 100%, 44% 100%);
        }

        /* Стилі для цифри всередині сектора */
        .sector-number {
            font-size: 12px;
            font-weight: 900;
            color: #ffffff;
            transform: rotate(0deg); /* Цифри дивляться до центру */
        }

        /* Кольори фону для секторів */
        .bg-red { background-color: #dc2626; }
        .bg-black { background-color: #1a1a1a; }
        .bg-green { background-color: #16a34a; }

        /* Маркер випавшого числа (стрілочка зверху) */
        .wheel-pointer {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff9f00;
        }

        .wheel-center {
            position: absolute;
            width: 75px;
            height: 75px;
            background: radial-gradient(circle, #2c3e50 0%, #1a252f 100%);
            border-radius: 50%;
            border: 3px solid #ff9f00;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 22px;
            color: #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            z-index: 5;
        }

        /* ПАНЕЛЬ СТАВОК */
        .betting-table {
            background: #131c2e;
            border: 1px solid #1f314f;
            border-radius: 12px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 450px;
            box-sizing: border-box;
        }

        .bet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .bet-option-btn {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            color: #fff;
            transition: opacity 0.2s, transform 0.1s;
        }
        .bet-option-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-red { background: #e74c3c; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }
        .btn-black { background: #2c3e50; border: 1px solid rgba(255,255,255,0.1); }
        .btn-even { background: #2980b9; }
        .btn-odd { background: #8e44ad; }

        .number-bet-box {
            background: #090f1a;
            border: 1px solid #1f314f;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }
        .number-bet-box label {
            display: block;
            font-size: 12px;
            color: #8fa0bc;
            margin-bottom: 8px;
        }
        .number-input-group {
            display: flex;
            gap: 10px;
        }
        .num-input {
            width: 80px;
            background: #131c2e;
            border: 1px solid #1f314f;
            border-radius: 6px;
            padding: 8px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }
        .main-btn {
            flex: 1;
            background: #ff9f00;
            border: none;
            border-radius: 6px;
            color: #0b111e;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .main-btn:hover { background: #e08b00; }
        .bank-btn {
            background: #131c2e;
            border: 1px solid #1f314f;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body class="roulette-body">

    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <h2>🎰 Cyber Roulette</h2>
        <button onclick="location.href='index.html'" class="bank-btn">← В ХАБ</button>
    </div>

    <div class="roulette-container">
        
        <div class="side-panel">
            <div class="stats-box">
                <p>Гравець: <strong id="roulette-name">Гість</strong></p>
                <p>Каса: <strong id="roulette-balance" style="color:#ff9f00;">1000$</strong></p>
                <p>Кредит: <strong id="roulette-credit" style="color: #e74c3c;">0$</strong></p>
            </div>
            <div class="history-box">
                <div class="history-title">Історія випадінь</div>
                <div id="history-logs">
                    <div style="color: #8fa0bc;">• Колесо чекає на запуск...</div>
                </div>
            </div>
        </div>

        <div class="wheel-area">
            <div class="wheel-pointer"></div>
            <div class="roulette-wheel" id="wheel"></div>
            <div class="wheel-center" id="wheel-center-val">--</div>
        </div>

        <div class="betting-table">
            <div class="bet-slider-container" style="display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 13px; color: #8fa0bc; min-width: 80px;">Сума ставки:</span>
                <input type="range" id="roulette-bet-slider" min="10" max="200" value="50" class="long-slider" style="margin-bottom:0;">
                <div class="bet-box" id="roulette-bet-box" style="background: #090f1a; border:1px solid #1f314f; padding:6px 12px; border-radius:6px; color:#ff9f00; font-weight:bold;">50$</div>
            </div>

            <hr style="border: 0; border-top: 1px solid #1f314f; margin-bottom: 5px;">

            <div class="bet-grid">
                <button class="bet-option-btn btn-red" id="bet-red">Червоне (x2)</button>
                <button class="bet-option-btn btn-black" id="bet-black">Чорне (x2)</button>
                <button class="bet-option-btn btn-even" id="bet-even">Парне (x2)</button>
                <button class="bet-option-btn btn-odd" id="bet-odd">Непарне (x2)</button>
            </div>

            <div class="number-bet-box">
                <label>СТАВКА НА КОНКРЕТНЕ ЧИСЛО (Коефіцієнт x36)</label>
                <div class="number-input-group">
                    <input type="text" id="specific-number" class="num-input" placeholder="0-36" maxlength="2">
                    <button class="main-btn" id="bet-number" style="padding: 10px;">Зробити ставку на число</button>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
    <script>
        const nameDisplay = document.getElementById('roulette-name');
        const balanceDisplay = document.getElementById('roulette-balance');
        const creditDisplay = document.getElementById('roulette-credit');
        const historyLogs = document.getElementById('history-logs');
        const wheel = document.getElementById('wheel');
        const wheelCenterVal = document.getElementById('wheel-center-val');

        const betSlider = document.getElementById('roulette-bet-slider');
        const betBox = document.getElementById('roulette-bet-box');

        // Оновлена послідовність чисел строго під картинку з Вікіпедії
        const wheelNumbers = [
            "0", "32", "15", "19", "4", "21", "2", "25", "17", "34", "6", "27", "13", "36", "11", "30", "8", "23", "10",
            "5", "24", "16", "33", "1", "20", "14", "31", "9", "22", "18", "29", "7", "28", "12", "35", "3", "26"
        ];

        const redNumbers = ["1", "3", "5", "7", "9", "12", "14", "16", "18", "19", "21", "23", "25", "27", "30", "32", "34", "36"];

        let isSpinning = false;
        let currentRotation = 0;

        // ФУНКЦІЯ ГЕНЕРАЦІЇ СЕКТОРІВ КОЛЕСА НА ЕКРАНІ
        function generateWheelSectors() {
            const totalSectors = wheelNumbers.length;
            const sectorDegrees = 360 / totalSectors;

            wheelNumbers.forEach((num, index) => {
                const sector = document.createElement('div');
                sector.className = 'wheel-sector';
                
                // Визначаємо колір фону
                if (num === "0") {
                    sector.classList.add('bg-green');
                } else if (redNumbers.includes(num)) {
                    sector.classList.add('bg-red');
                } else {
                    sector.classList.add('bg-black');
                }

                // Повертаємо сектор на його законний кут
                sector.style.transform = `rotate(${index * sectorDegrees}deg)`;

                // Створюємо цифру всередині
                const numberSpan = document.createElement('span');
                numberSpan.className = 'sector-number';
                numberSpan.innerText = num;

                sector.appendChild(numberSpan);
                wheel.appendChild(sector);
            });
        }

        function updateRouletteUI() {
            // Додано перевірку, щоб скрипт не падав, якщо об'єкт wallet ще не підключений з app.js
            if (typeof wallet !== 'undefined') {
                nameDisplay.innerText = wallet.getUsername();
                balanceDisplay.innerText = wallet.getBalance() + "$";
                creditDisplay.innerText = wallet.getCredit() + "$";
            }
        }

        betSlider.addEventListener('input', () => {
            betBox.innerText = betSlider.value + "$";
        });

        document.getElementById('bet-red').addEventListener('click', () => handleBet('red'));
        document.getElementById('bet-black').addEventListener('click', () => handleBet('black'));
        document.getElementById('bet-even').addEventListener('click', () => handleBet('even'));
        document.getElementById('bet-odd').addEventListener('click', () => handleBet('odd'));

        document.getElementById('bet-number').addEventListener('click', () => {
            const numInput = document.getElementById('specific-number').value.trim();
            if (numInput === "") {
                alert("Введіть число від 0 до 36!");
                return;
            }
            if (!wheelNumbers.includes(numInput)) {
                alert("Неіснуючий сектор! Введіть число від 0 до 36.");
                return;
            }
            handleBet('number', numInput);
        });

        function handleBet(betType, specificNum = null) {
            if (isSpinning) return;

            const betAmount = parseInt(betSlider.value);
            
            // Захист на випадок відсутності wallet
            const currentBalance = typeof wallet !== 'undefined' ? wallet.getBalance() : 1000;

            if (currentBalance < betAmount) {
                alert("У вас недостатньо грошей у касі для цієї ставки! Візьміть кредит у Хабі.");
                return;
            }

            if (typeof wallet !== 'undefined') wallet.updateBalance(-betAmount);
            updateRouletteUI();
            isSpinning = true;
            wheelCenterVal.innerText = "⏳";

            const randomIndex = Math.floor(Math.random() * wheelNumbers.length);
            const winningNumber = wheelNumbers[randomIndex];

            const totalSectors = 37; 
            const sectorDegrees = 360 / totalSectors; 
            
            // Розрахунок кута під стрілочку зверху (0 градусів)
            const targetAngle = randomIndex * sectorDegrees;
            
            // 5 повних обертів (1800 град) + зсув на потрібний сектор
            const spinDegrees = 1800 + targetAngle;
            currentRotation += spinDegrees;

            // Обертаємо за годинниковою стрілкою (стрілка фіксована зверху)
            wheel.style.transform = `rotate(-${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                wheelCenterVal.innerText = winningNumber;

                let numberColor = "Чорне";
                if (winningNumber === "0") {
                    numberColor = "Зелене";
                } else if (redNumbers.includes(winningNumber)) {
                    numberColor = "Червоне";
                }

                let isWin = false;
                let payoutFactor = 0;

                if (betType === 'red' && numberColor === 'Червоне') { isWin = true; payoutFactor = 2; }
                else if (betType === 'black' && numberColor === 'Чорне') { isWin = true; payoutFactor = 2; }
                else if (betType === 'even' && winningNumber !== "0" && parseInt(winningNumber) % 2 === 0) { isWin = true; payoutFactor = 2; }
                else if (betType === 'odd' && winningNumber !== "0" && parseInt(winningNumber) % 2 !== 0) { isWin = true; payoutFactor = 2; }
                else if (betType === 'number' && winningNumber === specificNum) { isWin = true; payoutFactor = 36; }

                let logText = "";
                if (isWin) {
                    const winAmount = betAmount * payoutFactor;
                    if (typeof wallet !== 'undefined') wallet.updateBalance(winAmount);
                    logText = `<div style="color: #2ecc71; margin-bottom: 5px;">• Випало: <strong>${winningNumber} (${numberColor})</strong>. Ви ВИГРАЛИ ${winAmount}$!</div>`;
                } else {
                    logText = `<div style="color: #e74c3c; margin-bottom: 5px;">• Випало: <strong>${winningNumber} (${numberColor})</strong>. Ви програли ${betAmount}$.</div>`;
                }

                historyLogs.innerHTML = logText + historyLogs.innerHTML;
                document.getElementById('specific-number').value = "";
                updateRouletteUI();

            }, 4000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            generateWheelSectors(); // Генеруємо барабан відразу при завантаженні
            updateRouletteUI();
        });
    </script>
</body>
</html>
